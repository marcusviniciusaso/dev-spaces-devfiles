schemaVersion: 2.2.0
metadata:
  name: custom-udi-java25-registry
  displayName: "Java 25 (Maven 3.9.12 / Gradle 9.3.1 / Spring Boot CLI 4.0.3)"
  description: "Java 25 para Maven 3.9.12, Gradle 9.3.1, Spring Boot CLI 4.0.3"
  version: 1.0.6
  tags: ["java", "spring", "maven", "gradle"]
components:
  - name: tools
    container:
      image: quay.io/marolive/custom-udi-java25:1.0.5
      mountSources: true
      sourceMapping: /projects
      memoryLimit: 2Gi
      memoryRequest: 1Gi
      cpuLimit: "1"
      cpuRequest: "0.5"
      env:
        - name: KUBEDOCK_ENABLED
          value: 'true'
        - name: DOCKER_HOST
          value: 'tcp://127.0.0.1:2475'
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: 'true'
        - name: TESTCONTAINERS_CHECKS_DISABLE
          value: 'true'
        - name: MAVEN_OPTS
          value: "-Dmaven.repo.local=/home/user/persistent/.m2/repository"
        - name: GRADLE_USER_HOME
          value: "/home/user/persistent/.gradle"
        - name: NEXUS_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-yum-central"
        - name: NEXUS_MAVEN_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-maven-central/"
        - name: "PODMAN_IGNORE_CGROUPSV1_WARNING"
          value: "true"
      volumeMounts:
        - name: persistent-storage
          path: /home/user/persistent
      endpoints:
        - exposure: none
          name: kubedock
          protocol: tcp
          targetPort: 2475
        - name: http-8080
          targetPort: 8080
          protocol: http
          exposure: public
  - name: persistent-storage
    volume:
      size: 1Gi
  - name: local-registry-pvc
    kubernetes:
      deployByDefault: true
      inlined: |
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: local-registry-pvc
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
  - name: local-registry-deploy
    kubernetes:
      deployByDefault: true
      inlined: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: local-registry
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: local-registry
          template:
            metadata:
              labels:
                app: local-registry
            spec:
              containers:
                - name: registry
                  image: quay.io/libpod/registry:2.8.2
                  ports:
                    - containerPort: 5000
                  volumeMounts:
                    - name: registry-storage
                      mountPath: /var/lib/registry
              volumes:
                - name: registry-storage
                  persistentVolumeClaim:
                    claimName: local-registry-pvc
  - name: local-registry-service
    kubernetes:
      deployByDefault: true
      inlined: |
        apiVersion: v1
        kind: Service
        metadata:
          name: local-registry
        spec:
          selector:
            app: local-registry
          ports:
            - name: registry
              port: 5000
              targetPort: 5000
