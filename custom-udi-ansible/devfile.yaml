schemaVersion: 2.2.2
metadata:
  generateName: custom-udi-ansible
  displayName: "Ansible (core 2.19.8), ansible-lint 26.4.0, ansible-navigator 26.4.0, molecule 26.4.0"
  description: "Container com tools para Ansible"
  version: 1.0.4
  tags: ["ansible", "ansible-lint", "ansible-navigator", "molecule"]
components:
  - name: tools
    container:
      image: quay.io/marolive/custom-udi-ansible:1.0.4
      mountSources: true
      sourceMapping: /projects
      memoryRequest: 256M
      memoryLimit: 6Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      env:
        - name: ANSIBLE_COLLECTIONS_PATH
          value: ~/.ansible/collections:/usr/share/ansible/collections
        - name: KUBEDOCK_ENABLED
          value: 'true'
        - name: DOCKER_HOST
          value: 'tcp://127.0.0.1:2475'
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: 'true'
        - name: TESTCONTAINERS_CHECKS_DISABLE
          value: 'true'
        - name: NEXUS_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-yum-central"
        - name: "PODMAN_IGNORE_CGROUPSV1_WARNING"
          value: "true"
      endpoints:
        - exposure: none
          name: kubedock
          protocol: tcp
          targetPort: 2475
