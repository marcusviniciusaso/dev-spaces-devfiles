schemaVersion: 2.2.2
metadata:
  generateName: custom-udi-python
  displayName: "Python 3.12.12 (pip 26.0.1 / virtualenv 21.2.4)"
  description: "Python 3.12.12 com pip 26.0.1 e virtualenv 21.2.4"
  version: 1.0.1
  tags: ["python", "pip", "virtualenv"]
components:
  - name: tools
    container:
      image: quay.io/marolive/custom-udi-python:1.0.2
      volumeMounts:
        - name: venv
          path: /home/user/.venv
      memoryLimit: 2Gi
      memoryRequest: 1Gi
      cpuLimit: '2'
      cpuRequest: '1'
      mountSources: true
      sourceMapping: /projects
      env:
        - name: KUBEDOCK_ENABLED
          value: 'true'
        - name: DOCKER_HOST
          value: 'tcp://127.0.0.1:2475'
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: 'true'
        - name: TESTCONTAINERS_CHECKS_DISABLE
          value: 'true'
        - name: NEXUS_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-yum-central"
        - name: NEXUS_PYPI_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-pypi-central/simple"
        - name: NEXUS_TRUSTED_HOST
          value: "<NEXUSREPOSITORY>"
        - name: "PODMAN_IGNORE_CGROUPSV1_WARNING"
          value: "true"
      endpoints:
        - exposure: none
          name: kubedock
          protocol: tcp
          targetPort: 2475
  - name: venv
    volume:
      size: 1G
