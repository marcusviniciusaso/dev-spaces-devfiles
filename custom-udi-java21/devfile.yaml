schemaVersion: 2.2.0
metadata:
  name: custom-udi-java21
  displayName: "Java 21 (Maven 3.9.12 / Gradle 8.14.4 / Spring Boot CLI 4.0.3)"
  description: "Java 21 para Maven 3.9.12, Gradle 8.14.4, Spring Boot CLI 4.0.3"
  version: 1.0.5
  tags: ["java", "spring", "maven", "gradle"]
components:
  - name: tools
    container:
      image: quay.io/marolive/custom-udi-java21:1.0.5
      mountSources: true
      sourceMapping: /projects
      memoryLimit: 2Gi
      memoryRequest: 1Gi
      cpuLimit: "1"
      cpuRequest: "0.5"
      env:
        - name: KUBEDOCK_ENABLED
          value: 'true'
        - name: DOCKER_HOST
          value: 'tcp://127.0.0.1:2475'
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: 'true'
        - name: TESTCONTAINERS_CHECKS_DISABLE
          value: 'true'
        - name: MAVEN_OPTS
          value: "-Dmaven.repo.local=/home/user/persistent/.m2/repository"
        - name: GRADLE_USER_HOME
          value: "/home/user/persistent/.gradle"
        - name: NEXUS_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-yum-central"
        - name: NEXUS_MAVEN_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-maven-central/"
        - name: "PODMAN_IGNORE_CGROUPSV1_WARNING"
          value: "true"
      volumeMounts:
        - name: persistent-storage
          path: /home/user/persistent
      endpoints:
        - exposure: none
          name: kubedock
          protocol: tcp
          targetPort: 2475
        - name: http-8080
          targetPort: 8080
          protocol: http
          exposure: public
  - name: persistent-storage
    volume:
      size: 1Gi
