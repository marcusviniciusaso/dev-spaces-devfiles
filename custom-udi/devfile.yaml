schemaVersion: 2.2.0
metadata:
  name: custom-base-udi
  displayName: "Custom Base UDI(Dev Spaces 3.22)"
  description: "Container com tools baseado na UDI com az/kubectl/helm/oc/cekit/kind/podman..."
  version: 1.2.3
  tags: ["openshift", "kubernetes", "helm", "podman", "azure"]
components:
  - name: tools
    container:
      image: quay.io/marolive/custom-udi:1.2.0
      mountSources: true
      sourceMapping: /projects
      memoryLimit: 4Gi
      cpuLimit: "2"
      env:
        - name: KUBEDOCK_ENABLED
          value: 'true'
        - name: DOCKER_HOST
          value: 'tcp://127.0.0.1:2475'
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: 'true'
        - name: TESTCONTAINERS_CHECKS_DISABLE
          value: 'true'
        - name: NEXUS_BASEURL
          value: "https://<NEXUSREPOSITORY>:8443/repository/public-yum-central"
      endpoints:
        - exposure: none
          name: kubedock
          protocol: tcp
          targetPort: 2475
